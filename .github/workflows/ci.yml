name: CI - Space Defender

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests NUnit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-

      - name: Run Tests (EditMode)
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          testMode: EditMode
          artifactsPath: test-results/
          coverageOptions: generateAdditionalMetrics;generateHtmlReport

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: CodeCoverage/
          retention-days: 14

  build_wgl:
    name: Build WebGL
    needs: test             		# Wait for tests to succeed
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request' # Only on main branch or in a pull request

    steps:
      - name: Checkout
        uses: actions/checkout@v4 

      - name: Cache Unity Library
        uses: actions/cache@v3 
        with:
          path: Library
          key: Library-Build-WebGL-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-Build-WebGL-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4 
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }} 
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }} 
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }} 
        with:
          targetPlatform: WebGL
          buildName: SpaceDefender 

      - name: Upload Build
        uses: actions/upload-artifact@v4 
        with:
          name: build-webgl 		# Artifact name
          path: build/WebGL/ 
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/WebGL/SpaceDefender 	# Generate folder by unity-builder
          branch: gh-pages 		# Create branch if doesn't exists

  build_windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: test 			# Build only launch if tests succeeded

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-Build-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-Build-

      - name: Build Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Space-Defender-Build
          path: build/StandaloneWindows64

      - name: Zip Build
        run: |
          cd build/StandaloneWindows64
          zip -r ../../Space-Defender-Windows.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          files: Space-Defender-Windows.zip
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: "Build generate automatically by CI/CD pipeline."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
