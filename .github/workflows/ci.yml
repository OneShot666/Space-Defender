name: CI - Space Defender

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & Tests NUnit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-

      - name: Run Tests (EditMode)
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          testMode: EditMode
          artifactsPath: test-results/
          coverageOptions: generateAdditionalMetrics;generateHtmlReport

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  build:
    name: Build WebGL
    needs: test             # Wait for tests to succeed
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # S'exécute uniquement sur la branche main 

    steps:
      - name: Checkout
        uses: actions/checkout@v4 

      - name: Cache Unity Library
        uses: actions/cache@v3 
        with:
          path: Library
          key: Library-Build-WebGL-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-Build-WebGL-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4 
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }} 
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }} 
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }} 
        with:
          targetPlatform: WebGL # Plateforme spécifiée dans le cahier des charges 
          buildName: SpaceDefender 

      - name: Upload Build
        uses: actions/upload-artifact@v4 
        with:
          name: build-webgl # Nom de l'artéfact demandé 
          path: build/WebGL/ 
          retention-days: 30 

  build:
    name: Build for Windows
    runs-on: ubuntu-latest
    needs: test # CRUCIAL : Build only launch if tests succeeded
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-Build-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-Build-

      - name: Build Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          # Tu peux changer StandaloneWindows64 par WebGL ou StandaloneOSX si besoin

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Space-Defender-Build
          path: build/StandaloneWindows64

