name: Get Activation File
on: workflow_dispatch

# On force l'autorisation au niveau global
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request activation file
        # On utilise la version v2.2.0 qui est la plus stable pour l'astuce du document
        uses: game-ci/unity-request-activation-file@v2.2.0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: registration-file
          path: ./*.alf
